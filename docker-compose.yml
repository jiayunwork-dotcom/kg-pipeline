version: '3.8'

services:
  neo4j:
    image: neo4j:5.13-community
    container_name: kg-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/kgpipeline2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kg-network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kg-fastapi
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: kgpipeline2024
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      MODEL_CACHE_DIR: /app/model_cache
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - model_cache:/app/model_cache
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - kg-network
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: kg-streamlit
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://fastapi:8000
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - fastapi
    networks:
      - kg-network
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  model_cache:

networks:
  kg-network:
    driver: bridge
